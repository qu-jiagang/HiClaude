<svg xmlns="http://www.w3.org/2000/svg" width="960" height="300" viewBox="0 0 960 300" role="img" aria-labelledby="title desc">
  <title id="title">Project checklist</title>
  <desc id="desc">Purchase, verify hardware, run service, flash firmware, print stand.</desc>
  <rect width="960" height="300" rx="18" fill="#f7fafb"/>
  <g font-family="Arial, sans-serif">
    <g transform="translate(72 76)">
      <circle cx="0" cy="0" r="28" fill="#0f6f8f"/>
      <text x="0" y="8" text-anchor="middle" font-size="24" font-weight="700" fill="#fff">1</text>
      <text x="0" y="70" text-anchor="middle" font-size="18" font-weight="700" fill="#111">购买</text>
    </g>
    <g transform="translate(270 76)">
      <circle cx="0" cy="0" r="28" fill="#0f6f8f"/>
      <text x="0" y="8" text-anchor="middle" font-size="24" font-weight="700" fill="#fff">2</text>
      <text x="0" y="70" text-anchor="middle" font-size="18" font-weight="700" fill="#111">验货</text>
    </g>
    <g transform="translate(468 76)">
      <circle cx="0" cy="0" r="28" fill="#0f6f8f"/>
      <text x="0" y="8" text-anchor="middle" font-size="24" font-weight="700" fill="#fff">3</text>
      <text x="0" y="70" text-anchor="middle" font-size="18" font-weight="700" fill="#111">服务</text>
    </g>
    <g transform="translate(666 76)">
      <circle cx="0" cy="0" r="28" fill="#0f6f8f"/>
      <text x="0" y="8" text-anchor="middle" font-size="24" font-weight="700" fill="#fff">4</text>
      <text x="0" y="70" text-anchor="middle" font-size="18" font-weight="700" fill="#111">刷机</text>
    </g>
    <g transform="translate(864 76)">
      <circle cx="0" cy="0" r="28" fill="#0f6f8f"/>
      <text x="0" y="8" text-anchor="middle" font-size="24" font-weight="700" fill="#fff">5</text>
      <text x="0" y="70" text-anchor="middle" font-size="18" font-weight="700" fill="#111">支架</text>
    </g>
  </g>
  <path d="M107 76h128M305 76h128M503 76h128M701 76h128" stroke="#15242d" stroke-width="4" stroke-linecap="round" stroke-dasharray="10 12"/>
  <text x="480" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#111">先确认硬件正常，再写项目固件，最后做外壳。</text>
</svg>
