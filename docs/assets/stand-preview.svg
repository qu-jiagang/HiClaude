<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="560" viewBox="0 0 1040 560" role="img" aria-labelledby="title desc">
  <title id="title">3D printed stand concept for LilyGo T5-ePaper-S3 4.7"</title>
  <desc id="desc">A concept of a 3D printed desktop stand with front lip, rear support, cable slot and battery clearance.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fbfc"/>
      <stop offset="1" stop-color="#e6edf2"/>
    </linearGradient>
    <linearGradient id="plastic" x1="0" x2="1">
      <stop offset="0" stop-color="#dfe6eb"/>
      <stop offset="1" stop-color="#b9c6ce"/>
    </linearGradient>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="12" flood-color="#10202a" flood-opacity=".22"/>
    </filter>
    <style>
      .label { font-family: Arial, sans-serif; font-size: 18px; fill: #111; }
      .small { font-family: Arial, sans-serif; font-size: 15px; fill: #5f6b7a; }
      .arrow { stroke: #0f6f8f; stroke-width: 4; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .dash { stroke-dasharray: 9 10; animation: dash 1.8s linear infinite; }
      @keyframes dash {
        to { stroke-dashoffset: -38; }
      }
    </style>
  </defs>
  <rect width="1040" height="560" fill="url(#bg)"/>
  <ellipse cx="520" cy="482" rx="360" ry="36" fill="#c8d3da" opacity=".58"/>

  <g filter="url(#shadow)">
    <path d="M226 390h596l44 64H182z" fill="url(#plastic)" stroke="#17202a" stroke-width="4"/>
    <path d="M244 350h554l24 40H222z" fill="#c8d3da" stroke="#17202a" stroke-width="4"/>
    <path d="M252 330h536v24H252z" fill="#f7fafb" stroke="#17202a" stroke-width="4"/>
    <path d="M300 174h440c27 0 49 22 49 49v125H251V223c0-27 22-49 49-49z" fill="url(#plastic)" stroke="#17202a" stroke-width="4"/>
    <path d="M304 199h432v122H304z" fill="#f8f6ed" stroke="#17202a" stroke-width="3"/>
    <rect x="328" y="221" width="386" height="76" fill="#fff" stroke="#111" stroke-width="2"/>
    <rect x="328" y="221" width="118" height="76" fill="#111"/>
    <text x="346" y="266" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#fff">45%</text>
    <text x="468" y="253" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#111">Agent 状态牌</text>
    <text x="468" y="281" font-family="Arial, sans-serif" font-size="16" fill="#111">Claude / Codex / 当前任务</text>
    <rect x="768" y="244" width="30" height="54" rx="6" fill="#12313d"/>
    <rect x="756" y="325" width="52" height="18" rx="4" fill="#12313d"/>
    <path d="M424 354h192v34H424z" fill="#fff3ce" stroke="#8a5a00" stroke-width="3"/>
    <text x="520" y="378" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#111">电池避让位</text>
  </g>

  <g>
    <path d="M178 166c64 18 92 54 112 101" class="arrow dash"/>
    <path d="M286 267l-20-5 16-14" class="arrow"/>
    <rect x="48" y="96" width="180" height="58" rx="12" fill="#fff" stroke="#17202a" stroke-width="2"/>
    <text x="138" y="131" text-anchor="middle" class="label">前托防滑边</text>
  </g>

  <g>
    <path d="M828 144c-40 30-58 69-62 116" class="arrow dash"/>
    <path d="M766 260l-13-18 22 1" class="arrow"/>
    <rect x="780" y="72" width="196" height="58" rx="12" fill="#fff" stroke="#17202a" stroke-width="2"/>
    <text x="878" y="107" text-anchor="middle" class="label">右侧按键露出</text>
  </g>

  <g>
    <path d="M816 428c-38-17-64-30-102-42" class="arrow dash"/>
    <path d="M714 386l20-7-7 20" class="arrow"/>
    <rect x="810" y="430" width="174" height="58" rx="12" fill="#fff" stroke="#17202a" stroke-width="2"/>
    <text x="897" y="464" text-anchor="middle" class="label">Type-C 走线槽</text>
  </g>

  <text x="520" y="520" text-anchor="middle" class="small">第一版建议只打印“倾斜桌面支架”，不要先做全包外壳；等实物孔位确认后再升级背壳。</text>
</svg>
