<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360" role="img" aria-labelledby="title desc">
  <title id="title">Agent e-paper architecture</title>
  <desc id="desc">Computer service sends state through Wi-Fi to ESP32-S3 e-paper display.</desc>
  <rect width="960" height="360" rx="18" fill="#f4f7f9"/>
  <g fill="#fff" stroke="#15242d" stroke-width="3">
    <rect x="54" y="78" width="242" height="180" rx="14"/>
    <rect x="359" y="78" width="242" height="180" rx="14"/>
    <rect x="664" y="78" width="242" height="180" rx="14"/>
  </g>
  <text x="175" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#111">电脑端</text>
  <text x="175" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" fill="#111">采集状态</text>
  <text x="175" y="198" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" fill="#111">生成 JSON / 预览</text>
  <text x="175" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" fill="#111">HTTP :8765</text>
  <text x="480" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#111">Wi-Fi</text>
  <path d="M438 185c23-23 61-23 84 0M455 204c13-13 37-13 50 0M474 224c4-4 8-4 12 0" fill="none" stroke="#0f6f8f" stroke-width="8" stroke-linecap="round"/>
  <text x="785" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#111">墨水屏</text>
  <text x="785" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" fill="#111">ESP32-S3</text>
  <text x="785" y="198" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" fill="#111">下载状态</text>
  <text x="785" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" fill="#111">刷新 800 x 480</text>
  <g stroke="#15242d" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M306 168h43"/>
    <path d="M337 156l14 12-14 12"/>
    <path d="M611 168h43"/>
    <path d="M642 156l14 12-14 12"/>
  </g>
  <text x="480" y="308" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#5f6b7a">USB 只用于烧录和调试；日常显示走局域网 Wi-Fi</text>
</svg>
